name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp asset URLs for cache busting
        run: |
          VERSION="${GITHUB_SHA:0:7}"
          for file in index.html gracias.html; do
            sed "s/__BUILD__/${VERSION}/g" "$file" > "${file}.tmp"
            mv "${file}.tmp" "$file"
          done
          echo "Deployed asset version: ${VERSION}"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
